services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: weios
      POSTGRES_USER: weios
      POSTGRES_PASSWORD: weios
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: weios
      MINIO_ROOT_PASSWORD: weios-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
